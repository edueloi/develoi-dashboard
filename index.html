<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO -->
    <title>Develoi — A Elite do Desenvolvimento Digital</title>

    <meta name="keywords" content="desenvolvimento de software, sistemas web, SaaS, desenvolvimento digital, consultoria de TI, marketing digital, agência digital, São Paulo, Develoi" />
    <meta name="author" content="Develoi" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#030303" />
    <link rel="canonical" href="https://develoi.com.br/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/develoi-logo.png" />
    <link rel="apple-touch-icon" href="/develoi-logo.png" />
    <link rel="shortcut icon" type="image/png" href="/develoi-logo.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://develoi.com.br/" />
    <meta property="og:site_name" content="Develoi" />
    <meta property="og:title" content="Develoi — A Elite do Desenvolvimento Digital" />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@develoi" />
    <meta name="twitter:title" content="Develoi — A Elite do Desenvolvimento Digital" />
    <meta name="twitter:description" content="Transformamos visões complexas em experiências digitais de elite. Sistemas sob medida, SaaS e soluções completas para o seu negócio." />
    <meta name="twitter:image" content="https://develoi.com.br/develoi-logo.png" />

    <!-- Geo -->
    <meta name="geo.region" content="BR-SP" />
    <meta name="geo.placename" content="São Paulo" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Develoi",
      "url": "https://develoi.com.br",
      "logo": "https://develoi.com.br/develoi-logo.png",

      "address": {
        "@type": "PostalAddress",
        "addressLocality": "São Paulo",
        "addressRegion": "SP",
        "addressCountry": "BR"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "contato@develoi.com.br",
        "availableLanguage": "Portuguese"
      },
      "sameAs": [
        "https://instagram.com/develoi",
        "https://linkedin.com/company/develoi",
        "https://github.com/develoi"
      ]

    <div id="root"></div>
